services:
  # PostgreSQL mit PostGIS für Produktion
  postgres:
    image: postgis/postgis:15-3.4
    container_name: weather-postgres-prod
    environment:
      POSTGRES_DB: weather_history
      POSTGRES_USER: weather_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-weather_prod_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "127.0.0.1:5432:5432" # Only localhost access
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../development/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - weather-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_user -d weather_history"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    # Resource limits für Hetzner CX23 (2 vCPU, 4 GB RAM)
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Redis für Caching und Queues
  redis:
    image: redis:7-alpine
    container_name: weather-redis-prod
    ports:
      - "127.0.0.1:6379:6379" # Only localhost access
    volumes:
      - redis_data:/data
    networks:
      - weather-network-prod
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    # Resource limits für Hetzner CX23
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  # Laravel Backend (PHP + Nginx) für Produktion
  laravel-backend:
    build:
      context: ../../laravel-backend
      dockerfile: ../docker/development/Dockerfile.laravel
    container_name: weather-laravel-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3031:80" # API Port - localhost only for Hetzner nginx proxy
    volumes:
      - ../../laravel-backend:/var/www/html
      - ../development/nginx/laravel.conf:/etc/nginx/conf.d/default.conf:ro
      - ../development/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-weather_history}
      DB_USERNAME: ${DB_USERNAME:-weather_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_URL: https://${API_DOMAIN:-weather-api.elmarhepp.de}
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY:-base64:jxwGV8A4TenqVpBJ8MQqjVQM7K9pnAOhJ+kkRPh9J6w=}
      LOG_CHANNEL: stack
    networks:
      - weather-network-prod
    restart: unless-stopped
    # Resource limits für Hetzner CX23
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M

  # Vue.js Frontend (Node + Nginx) für Produktion
  vue-frontend:
    build:
      context: ../../vue-frontend
      dockerfile: ../docker/development/Dockerfile.vue
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3032/api}
    container_name: weather-vue-prod
    depends_on:
      - laravel-backend
    ports:
      - "127.0.0.1:3030:80" # Frontend Port - localhost only for Hetzner nginx proxy
    volumes:
      - ../development/nginx/vue.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      VITE_API_BASE_URL: https://${API_DOMAIN:-weather-api.elmarhepp.de}
      VITE_APP_NAME: "Weather History Deutschland"
    networks:
      - weather-network-prod
    restart: unless-stopped
    # Resource limits für Hetzner CX23
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

networks:
  weather-network-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
